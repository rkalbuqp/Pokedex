<div *ngIf="pokemons.length">
  <h2>Lista de Pokémons</h2>
  <ul>
    <li *ngFor="let pokemon of pokemons">
      <strong>{{ pokemon.name | titlecase }}</strong> -
      <a [href]="pokemon.url" target="_blank">Ver Detalhes</a>
    </li>
  </ul>
</div>
<div *ngIf="pokemons.length === 0">
  <p>Carregando Pokémons...</p>
</div>

<router-outlet />
